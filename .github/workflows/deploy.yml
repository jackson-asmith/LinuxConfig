name: Deploy

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: "Target host IP or FQDN to deploy to"
        required: true
        type: string
      hostname:
        description: "Short hostname to configure on the target"
        required: true
        type: string
      fqdn:
        description: "Fully qualified domain name to configure on the target"
        required: true
        type: string
      skip_base_setup:
        description: "Skip base setup stage"
        type: boolean
        default: false
      skip_ad_join:
        description: "Skip AD join stage"
        type: boolean
        default: false
      skip_satellite:
        description: "Skip Satellite registration stage"
        type: boolean
        default: false
      skip_ad_rejoin_cron:
        description: "Skip AD rejoin cron stage"
        type: boolean
        default: false

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  deploy:
    name: Deploy to ${{ inputs.target_host }}
    needs: lint
    runs-on: ubuntu-latest

    # Requires a 'production' environment to be configured in GitHub with
    # required reviewers, preventing unreviewed deploys.
    # Settings > Environments > production
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── SSH setup ────────────────────────────────────────────────────────────

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Prefer a stored known_hosts entry (avoids MITM risk of blind keyscan).
          # Set DEPLOY_KNOWN_HOST in GitHub Actions variables using the output of:
          #   ssh-keyscan <target_host>
          # If not set, fall back to keyscan (acceptable for first-time bootstrapping).
          if [[ -n "${{ vars.DEPLOY_KNOWN_HOST }}" ]]; then
            echo "${{ vars.DEPLOY_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          else
            echo "WARNING: DEPLOY_KNOWN_HOST not set, falling back to ssh-keyscan." >&2
            ssh-keyscan -p "${{ vars.SSH_PORT || 22 }}" \
              -H "${{ inputs.target_host }}" >> ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      # ── Copy scripts to target ───────────────────────────────────────────────

      - name: Copy scripts to target host
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT || 22 }}" \
            scripts/ config/ \
            "${{ vars.DEPLOY_USER }}@${{ inputs.target_host }}:/opt/linuxconfig/"

      # ── Write env file to tmpfs on target ────────────────────────────────────
      #
      # /dev/shm is a tmpfs mount — contents exist only in memory and are never
      # written to disk. The file is shredded in the cleanup step below, which
      # runs even if the deploy fails.

      - name: Write env file to target tmpfs
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ vars.SSH_PORT || 22 }}" \
            "${{ vars.DEPLOY_USER }}@${{ inputs.target_host }}" \
            "umask 077; cat > /dev/shm/.deploy.env" << 'EOF'
          # Auto-generated by deploy workflow — do not edit
          export HOSTNAME="${{ inputs.hostname }}"
          export FQDN="${{ inputs.fqdn }}"
          export ADMIN_USER="${{ vars.ADMIN_USER }}"
          export ADMIN_SSH_KEY="${{ vars.ADMIN_SSH_KEY }}"
          export SSH_PORT="${{ vars.SSH_PORT }}"
          export NTP_SERVERS="${{ vars.NTP_SERVERS }}"
          export FIREWALL_EXTRA_SERVICES="${{ vars.FIREWALL_EXTRA_SERVICES }}"
          export LOGIN_BANNER="${{ vars.LOGIN_BANNER }}"
          export AD_DOMAIN="${{ vars.AD_DOMAIN }}"
          export AD_SERVER="${{ vars.AD_SERVER }}"
          export KRB5_REALM="${{ vars.KRB5_REALM }}"
          export AD_JOIN_USER="${{ vars.AD_JOIN_USER }}"
          export AD_JOIN_PASS="${{ secrets.AD_JOIN_PASS }}"
          export SATELLITE_SERVER="${{ vars.SATELLITE_SERVER }}"
          export SATELLITE_ORG="${{ vars.SATELLITE_ORG }}"
          export SATELLITE_ACTIVATION_KEY="${{ secrets.SATELLITE_ACTIVATION_KEY }}"
          export SATELLITE_ENV="${{ vars.SATELLITE_ENV }}"
          export WHEEL_USER="${{ vars.WHEEL_USER }}"
          export REJOIN_SCRIPT="${{ vars.REJOIN_SCRIPT }}"
          export SKIP_BASE_SETUP="${{ inputs.skip_base_setup }}"
          export SKIP_AD_JOIN="${{ inputs.skip_ad_join }}"
          export SKIP_SATELLITE="${{ inputs.skip_satellite }}"
          export SKIP_AD_REJOIN_CRON="${{ inputs.skip_ad_rejoin_cron }}"
          EOF

      # ── Deploy ───────────────────────────────────────────────────────────────

      - name: Run deploy.sh
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ vars.SSH_PORT || 22 }}" \
            "${{ vars.DEPLOY_USER }}@${{ inputs.target_host }}" \
            "source /dev/shm/.deploy.env && sudo -E bash /opt/linuxconfig/scripts/deploy.sh"

      # ── Cleanup ──────────────────────────────────────────────────────────────

      - name: Remove env file from target
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ vars.SSH_PORT || 22 }}" \
            "${{ vars.DEPLOY_USER }}@${{ inputs.target_host }}" \
            "shred -u /dev/shm/.deploy.env 2>/dev/null || true"
